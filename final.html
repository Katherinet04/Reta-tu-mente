<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Felicidades!</title>
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/components.css">
</head>
<body class="game-bg">
    <div class="screen final-screen">
        <div class="trophy-icon">🏆</div>
        <h1 class="title-game">¡FELICITACIONES!</h1>

        <div class="final-stats">
            <div class="stat-box">
                <div class="value" id="final-score">0</div>
                <div class="label">Puntaje Total</div>
            </div>
            <div class="stat-box">
                <div class="value" id="final-level">2</div>
                <div class="label">Nivel Alcanzado</div>
            </div>
        </div>

        <p id="final-message" style="color:#fff; font-size:1.1rem; max-width:400px;"></p>

        <div class="final-buttons">
            <button class="btn-game btn-primary" id="btn-replay">🔄 Jugar Otra Vez</button>
            <button class="btn-game btn-secondary" id="btn-menu">🏠 Volver al Menú</button>
        </div>
    </div>

    <script src="js/core/player.js"></script>
    <script src="js/core/audio-manager.js"></script>
    <script src="js/core/effects.js"></script>
    <script src="js/core/mascot.js"></script>
    <script>
        const points = PlayerStore.getPoints();
        const player = PlayerStore.get();
        const won = points >= 100;

        AudioManager.init();
        Mascot.init({ type: 'cat' });

        document.getElementById('final-score').textContent = '⭐ ' + points;
        document.getElementById('final-level').textContent = won ? '2' : '1';

        const msg = document.getElementById('final-message');
        if (player) {
            msg.textContent = won
                ? `¡${player.nombre}, eres un campeón! Completaste la aventura con ${points} puntos.`
                : `¡Buen intento, ${player.nombre}! Tu puntaje fue ${points}. ¡Inténtalo de nuevo!`;
        }

        PlayerStore.updateScore(points);

        if (won) {
            GameEffects.onWin();
            Mascot.say('¡LO LOGRASTE! ¡Eres increíble! 🏆');
        } else {
            GameEffects.onLose();
            Mascot.say('¡No te rindas! La próxima lo logras. 💪');
        }

        document.getElementById('btn-replay').addEventListener('click', () => {
            AudioManager.playUI();
            localStorage.setItem('points', '0');
            window.location.href = 'principal.html';
        });

        document.getElementById('btn-menu').addEventListener('click', () => {
            AudioManager.playUI();
            window.location.href = 'menu.html';
        });
    </script>
</body>
</html>
